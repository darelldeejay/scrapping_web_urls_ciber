name: status-check

on:
  workflow_dispatch:
    inputs:
      send_channels:
        description: "Dónde enviar"
        required: true
        default: "both"
        type: choice
        options: [none, telegram, teams, both]
      dry_run:
        description: "Solo previsualización (no envía)"
        required: true
        default: "true"
        type: boolean
      also_text:
        description: "Incluir versión de texto en el mensaje (compat; no necesario)"
        required: false
        default: "false"
        type: boolean
      impacto_override:
        description: "Impacto en servicios del cliente (override opcional)"
        required: false
        default: ""
        type: string
      accion_override:
        description: "Acción sugerida (override opcional)"
        required: false
        default: ""
        type: string
  schedule:
    # 🔴 CRON: Se ejecuta automáticamente a las 09:00 Madrid (UTC+1 o +2)
    # UTC times: 7:00 (invierno CET), 6:00 (verano CEST)
    - cron: "0 6 * * *"
    #- cron: "0 7 * * *"
    #- cron: "0 8 * * *"

concurrency:
  group: dora-status-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt-in para Node.js 24 (deprecation de Node.js 20)
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  
  # Valores por defecto para CRON (se sobrescribirán en manual si es necesario)
  # En schedule, inputs NO están disponibles, así que usamos env directamente
  DEFAULT_SEND_CHANNELS: "both"
  DEFAULT_DRY_RUN: "false"        # CRON ENVÍA DE VERDAD (no preview)

jobs:
  vendors:
    name: Scraping vendors (solo export JSON)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        vendor: [netskope, proofpoint, qualys, aruba, imperva, cyberark, trendmicro, guardicore]

    steps:
      - uses: actions/checkout@v6

      - name: Verificar hora local en España
        if: github.event_name == 'schedule'
        run: |
          HORA_MADRID=$(TZ="Europe/Madrid" date +%H)
          echo "La hora en Madrid es: $HORA_MADRID"
          if [ "$HORA_MADRID" != "09" ]; then
            echo "No son las 9 AM en España. Cancelando esta ejecución..."
            gh run cancel ${{ github.run_id }}
            sleep 10
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare out dirs
        run: mkdir -p .github/out/vendors

      # ⛔️ Ya NO enviamos mensajes por vendor; solo exportamos JSON
      - name: Export ${{ matrix.vendor }} to JSON (no notify)
        id: export
        run: |
          echo "🔄 Iniciando scraping de ${{ matrix.vendor }}..."
          echo "   Timeout: 180s (3 min en CI para conexiones lentas)"
          
          # Capturar timing
          START=$(date +%s)
          
          if python scripts/run_vendor.py --vendor ${{ matrix.vendor }} --export-json ".github/out/vendors/${{ matrix.vendor }}.json"; then
            END=$(date +%s)
            ELAPSED=$((END - START))
            echo "✅ ${{ matrix.vendor }} completado exitosamente en ${ELAPSED}s"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            END=$(date +%s)
            ELAPSED=$((END - START))
            echo "❌ Error en ${{ matrix.vendor }} después de ${ELAPSED}s"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Verify JSON was created
        run: |
          FILE=".github/out/vendors/${{ matrix.vendor }}.json"
          if [ -f "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null || echo "unknown")
            echo "✅ JSON creado: $FILE (tamaño: $SIZE bytes)"
            
            # Mostrar primeros datos para verificar que NO está vacío
            echo "📋 Primeras líneas del JSON:"
            head -c 300 "$FILE" || echo "No se pudo leer"
            echo ""
          else
            echo "❌ ERROR CRÍTICO: No se creó $FILE"
            echo "   El vendor ${{ matrix.vendor }} falló completamente"
            exit 1
          fi

      - name: Upload vendor summary (per-vendor artifact)
        if: always()
        uses: actions/upload-artifact@v7  
        with:
          name: vendor-${{ matrix.vendor }}
          path: .github/out/vendors/${{ matrix.vendor }}.json
          if-no-files-found: warn
          retention-days: 7

  digest:
    name: Build & send digest (Telegram=texto, Teams=HTML)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: vendors
    if: always()
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6     
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download vendor artifacts
        uses: actions/download-artifact@v8
        with:
          path: .github/out
          pattern: vendor-*
          merge-multiple: false

      - name: Flatten artifact structure (vendor-* → vendors/)
        run: |
          mkdir -p .github/out/vendors
          for artifact_dir in .github/out/vendor-*; do
            if [ -d "$artifact_dir" ]; then
              mv "$artifact_dir"/*.json .github/out/vendors/ 2>/dev/null || true
              rmdir "$artifact_dir" 2>/dev/null || true
            fi
          done
          echo "✅ Artifacts reorganizados"

      - name: Verify downloaded artifacts
        id: verify_artifacts
        run: |
          echo "📂 Contenido de .github/out/vendors:"
          ls -lah .github/out/vendors/ 2>/dev/null || echo "⚠️ Carpeta no existe o está vacía"
          echo ""
          echo "📊 Conteo de JSONs:"
          COUNT=$(find .github/out/vendors -name "*.json" 2>/dev/null | wc -l)
          echo "Total JSONs encontrados: $COUNT"
          
          # Listar cada archivo para debug
          if [ "$COUNT" -gt 0 ]; then
            echo ""
            echo "Archivos detectados:"
            find .github/out/vendors -name "*.json" -exec sh -c 'echo "  - $(basename {}) ($(stat -c%s {} 2>/dev/null || stat -f%z {} 2>/dev/null) bytes)"' \;
          fi
          
          if [ "$COUNT" -eq 0 ]; then
            echo ""
            echo "⚠️ CRÍTICO: No hay archivos JSON de vendors"
            echo "   Esto significa que el job vendors FALLÓ"
            echo "   Revisa el log del job anterior: vendors → cada vendor"
          else
            echo "✅ Se descargaron $COUNT JSONs de vendors"
          fi
          
          # Exportar para siguiente step
          echo "artifact_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Build digest data JSON
        run: |
          python scripts/build_digest_data.py \
            --vendors-dir .github/out/vendors \
            --out .github/out/digest_data.json
          
          echo "📄 Contenido de digest_data.json (primeras 300 chars):"
          head -c 300 .github/out/digest_data.json || echo "❌ No se creó digest_data.json"

      - name: Validate digest data (check if vendors had data)
        id: validate
        run: |
          echo "🔍 Validando contenido del digest..."
          python scripts/validate_digest.py --data .github/out/digest_data.json
          
          if [ $? -eq 0 ]; then
            echo "✅ Digest válido, proceder a enviar"
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Digest inválido, ABORTANDO envío"
            echo "valid=false" >> $GITHUB_OUTPUT
            # NO usamos exit 1 aquí para permitir que el job continúe y reporte
            # pero la siguiente etapa checará este flag
          fi

      - name: Compute flags (manual dispatch vs cron)
        id: flags
        run: |
          # Detectar si es manual (workflow_dispatch) o cron (schedule)
          TRIGGER="${{ github.event_name }}"
          echo "🔍 Trigger: $TRIGGER"
          
          # Para workflow_dispatch, usar inputs explícitamente
          # Para schedule, usar defaults robustos
          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            echo "📤 Ejecutado MANUAL desde GitHub Actions"
            CHANNELS="${{ inputs.send_channels }}"
            DRY="${{ inputs.dry_run }}"
            ALSO="${{ inputs.also_text }}"
            IMPACTO="${{ inputs.impacto_override }}"
            ACCION="${{ inputs.accion_override }}"
          else
            echo "🔔 Ejecutado CRON (schedule trigger)"
            # En cron, usar defaults seguros y explícitos
            CHANNELS="${{ env.DEFAULT_SEND_CHANNELS }}"
            DRY="${{ env.DEFAULT_DRY_RUN }}"
            ALSO="false"
            IMPACTO=""
            ACCION=""
          fi
          
          # Validar que no estén vacíos (fallback defensivo)
          [ -z "$CHANNELS" ] && CHANNELS="both"
          [ -z "$DRY" ] && DRY="false"
          [ -z "$ALSO" ] && ALSO="false"
          
          # Convertir boolean "true"/"false" a minúsculas para consistencia
          DRY=$(echo "$DRY" | tr '[:upper:]' '[:lower:]')
          ALSO=$(echo "$ALSO" | tr '[:upper:]' '[:lower:]')
          
          echo "📋 Config final:"
          echo "  CHANNELS=$CHANNELS"
          echo "  DRY_RUN=$DRY"
          echo "  ALSO_TEXT=$ALSO"
          
          # Exportar al environment para los siguientes steps
          echo "CHANNELS=$CHANNELS" >> $GITHUB_ENV
          echo "NOTIFY_DRY_RUN=$DRY" >> $GITHUB_ENV
          echo "ALSO_TEXT=$ALSO" >> $GITHUB_ENV
          
          # Si hay overrides, guardamos JSON para mezclar luego
          if [ -n "$IMPACTO" ] || [ -n "$ACCION" ]; then
            echo "{\"IMPACTO_CLIENTE_SI_NO\":\"$IMPACTO\",\"ACCION_SUGERIDA\":\"$ACCION\"}" > .github/out/overrides.json
            echo "OVERRIDES_PATH=.github/out/overrides.json" >> $GITHUB_ENV
          else
            echo "OVERRIDES_PATH=" >> $GITHUB_ENV
          fi

      - name: Merge overrides (optional)
        if: ${{ env.OVERRIDES_PATH != '' }}
        run: |
          python - << 'PY'
          import json
          base = json.load(open(".github/out/digest_data.json","r",encoding="utf-8"))
          over = json.load(open(".github/out/overrides.json","r",encoding="utf-8"))
          base.update({k:v for k,v in over.items() if v != ""})
          json.dump(base, open(".github/out/digest_data.json","w",encoding="utf-8"), ensure_ascii=False, indent=2)
          print("✅ Overrides fusionados")
          PY

      - name: Send or preview digest
        if: ${{ steps.validate.outputs.valid == 'true' || env.NOTIFY_DRY_RUN == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          NOTIFY_DRY_RUN: ${{ env.NOTIFY_DRY_RUN }}
        run: |
          echo "🚀 Iniciando envío de digest..."
          echo "  📤 Canales: $CHANNELS"
          echo "  👁️ Dry-run: $NOTIFY_DRY_RUN"
          
          CMD="python scripts/run_digest.py \
            --text-template templates/dora_email.txt \
            --html-template templates/dora_email.html \
            --data .github/out/digest_data.json \
            --channels \"$CHANNELS\""
          
          if [ "$ALSO_TEXT" = "true" ]; then
            CMD="$CMD --also-text"
          fi
          if [ "$NOTIFY_DRY_RUN" = "true" ]; then
            CMD="$CMD --preview-out .github/out/preview"
          fi
          
          echo "[RUN] $CMD"
          if eval $CMD; then
            echo "✅ Digest procesado correctamente"
          else
            echo "❌ Error procesando digest"
            exit 1
          fi

      - name: "⛔️ BLOCKED: Digest vacío, no se envió"
        if: ${{ steps.validate.outputs.valid == 'false' && env.NOTIFY_DRY_RUN == 'false' }}
        run: |
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║ 🛑 DIGEST VACÍO - ENVÍO BLOQUEADO                                  ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "⚠️  NO se envió ningún reporte porque los datos estaban vacíos."
          echo ""
          echo "Probable causa:"
          echo "  • Los sitios de status estaban CAÍDOS o no respondían"
          echo "  • Los selectores CSS de algún vendor cambiaron"
          echo "  • Problema de conectividad de red en el runner"
          echo "  • Timeout esperando a que cargue Selenium"
          echo ""
          echo "Próximos pasos:"
          echo "  1. Ejecuta localmente: python scripts/diagnose.py"
          echo "  2. Identifica qué vendor falló"
          echo "  3. Revisa: SAVE_HTML=1 python scripts/run_vendor.py --vendor <name>"
          echo ""
          echo "Si es bloqueado incorrectamente en dry-run, revisa validate_digest.py"
          echo ""

      - name: Upload digest preview
        if: ${{ env.NOTIFY_DRY_RUN == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: digest-preview
          path: |
            .github/out/preview/**
            .github/out/digest_data.json
          if-no-files-found: error

      - name: Summary
        if: always()
        run: |
          echo "📊 RESUMEN DE EJECUCIÓN"
          echo "======================="
          echo "✅ Workflow completado"
          if [ "$NOTIFY_DRY_RUN" = "true" ]; then
            echo "📋 Revisar artifacts: digest-preview"
          fi
